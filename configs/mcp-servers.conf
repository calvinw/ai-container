# Shared MCP endpoint list. All install scripts read this file.
#
# Format: name=url[|transport[|HeaderName:$ENV_VAR ...]]
#
#   name=url                          SSE transport, no auth
#   name=url|http|HeaderName:$VAR     HTTP transport, header value from env var
#   name=url|http|H1:$V1|H2:$V2      Multiple headers
#
# If a referenced $ENV_VAR is unset at install time, that entry is skipped
# with a warning.
#
# For each $ENV_VAR you add here, you must also:
#   1. Add the secret value at: https://github.com/settings/codespaces
#   2. Declare the variable name in .devcontainer/devcontainer.json under "secrets"
#      so Codespaces injects it at container creation time.
#
# After editing this file, run:
#   install-mcps.sh
#
# ── Active MCPs ───────────────────────────────────────────────────────────────

# Dolt database MCP (no auth required)
dolt=https://bus-mgmt-databases.mcp.mathplosion.com/mcp-dolt-database/sse

# Stitch MCP (requires STITCH_API_KEY secret in Codespace settings)
#stitch=https://stitch.googleapis.com/mcp|http|X-Goog-Api-Key:$STITCH_API_KEY
